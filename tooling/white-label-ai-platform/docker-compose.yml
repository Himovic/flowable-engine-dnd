version: '3.9'
services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"

  predictive-billing-scoring:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install fastapi uvicorn && uvicorn plugin_service:app --host 0.0.0.0 --port 8100"
    environment:
      - PLUGIN_NAME=predictive-billing-scoring
      - PLUGIN_INDUSTRY=banking
      - PLUGIN_VERSION=1.0.0
      - PLUGIN_DESCRIPTION=Predictive billing risk scoring
    volumes:
      - ./shared:/app
    ports:
      - "8100:8100"
